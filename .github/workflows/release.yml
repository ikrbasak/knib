name: Release

on:
  push:
    branches: [main]

# Disable lefthook git hooks in CI: the version-packages commit and the
# push made by changesets/action must not trigger pre-commit / pre-push.
env:
  LEFTHOOK: '0'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create tags and GitHub releases
  pull-requests: write # open and update the "Version Packages" PR
  id-token: write # OIDC token exchange for npm trusted publishing

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages [skip-ci]'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
